---
name: "Build Social Doekoe Container"

# Bouwt onze fork als Docker image en pusht naar ghcr.io/socialdoekoe/postiz-app
# Triggers: bij push naar main + handmatig vanuit GitHub Actions UI

on:
  workflow_dispatch:
  push:
    branches:
      - main

# Voorkomt dat 2 builds tegelijk lopen
concurrency:
  group: socialdoekoe-build
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push (amd64 only voor snelheid)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dev
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/socialdoekoe/postiz-app:latest
            ghcr.io/socialdoekoe/postiz-app:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_VERSION=socialdoekoe-${{ github.sha }}
          provenance: false
          sbom: false
